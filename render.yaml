services:
  - type: web
    name: hengebuken-golf-app
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hengebuken-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

databases:
  - name: hengebuken-db
    databaseName: hengebuken
    user: hengebuken_user